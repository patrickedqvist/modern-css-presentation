<!-- CodePen slide — full-bleed embedded pen, no title or chrome.
     Replace SLUG with the pen's slug (the hash in the URL).
     Replace USER with the CodePen username.
     The CodePen embed script must be loaded once in the page:
       <script async src="https://cpwebassets.codepen.io/assets/embed/ei.js"></script>
     It is already included in index.html — no need to add it again. -->
<section id="SLIDE_ID" class="slide slide--codepen js-slide" data-accent="blue">
  <div class="slide__inner">
    <div class="slide__frame">
      <p class="codepen"
         data-height="100%"
         data-default-tab="result"
         data-slug-hash="SLUG"
         data-user="USER">
      </p>
    </div>
  </div>
</section>
