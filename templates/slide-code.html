<!-- Code slide — code block on the left, annotation panel on the right.
     lang: css | html | javascript | typescript | json | text -->

    <div class="slide__frame">
      <header class="slide__header">
        <p class="eyebrow">EYEBROW</p>

      <div class="code-layout">
        <code-block lang="css"><script type="text/plain">

        <aside class="panel panel--annotation">
          <p class="panel__eyebrow">Panel label</p>
          <ul class="feature-list">
            <li>Annotation one</li>

            <li>Annotation three</li>
          </ul>
        </aside>
      </div>
    </div>
  </div>
