<!-- Title slide — used for the opening/cover slide.
     data-accent: blue | green | purple | warning | danger -->
<section id="SLIDE_ID" class="slide slide--title js-slide" data-accent="blue">
  <div class="slide__inner">
    <div class="slide__frame">
      <div class="slide__chrome">
        <span class="slide__index">01</span>
        <span class="slide__rule" aria-hidden="true"></span>
      </div>

      <div class="slide__content">
        <p class="eyebrow">EYEBROW</p>
        <h1 class="display-title">Main title here</h1>
        <p class="lede">
          Supporting line that sets context.
        </p>
        <div class="meta-row">
          <span>Speaker Name</span>
          <span>Event</span>
          <span>Duration</span>
        </div>
      </div>
    </div>
  </div>
</section>
